<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Guardian - Safe Deployment Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .checks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .check-item {
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid;
            background: #f9fafb;
        }
        
        .check-item.pass {
            border-color: #10b981;
            background: #ecfdf5;
        }
        
        .check-item.fail {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .check-item.warning {
            border-color: #f59e0b;
            background: #fffbeb;
        }
        
        .check-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .check-message {
            font-size: 14px;
            color: #666;
        }
        
        .summary {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
        }
        
        .summary-item {
            flex: 1;
            text-align: center;
        }
        
        .summary-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .summary-label {
            color: #666;
            font-size: 14px;
        }
        
        .history-item {
            padding: 15px;
            border-radius: 8px;
            background: #f9fafb;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-rollback {
            background: #fef3c7;
            color: #92400e;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .recommendation {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }
        
        .recommendation.safe {
            background: #d1fae5;
            color: #065f46;
        }
        
        .recommendation.warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .recommendation.danger {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Deploy Guardian</h1>
            <p class="subtitle">AI-Powered Deployment Safety Assistant</p>
        </header>
        
        <div class="card">
            <h2>Pre-Deployment Validation</h2>
            <div class="form-group">
                <label>Environment</label>
                <select id="environment">
                    <option value="production">Production</option>
                    <option value="staging">Staging</option>
                    <option value="development">Development</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Branch</label>
                <input type="text" id="branch" placeholder="e.g., main, feature/new-feature" value="main">
            </div>
            
            <div class="form-group">
                <label>Environment Variables (comma-separated)</label>
                <input type="text" id="envVars" placeholder="e.g., DATABASE_URL, API_KEY, SECRET_TOKEN" value="DATABASE_URL,API_KEY">
            </div>
            
            <button class="btn btn-primary" onclick="validateDeployment()">🔍 Run Pre-Deploy Checks</button>
        </div>
        
        <div id="validationResults" class="card hidden">
            <h2>Validation Results</h2>
            <div class="summary">
                <div class="summary-item">
                    <div class="summary-value" style="color: #10b981;" id="passedCount">0</div>
                    <div class="summary-label">Passed</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #f59e0b;" id="warningCount">0</div>
                    <div class="summary-label">Warnings</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" style="color: #ef4444;" id="failedCount">0</div>
                    <div class="summary-label">Failed</div>
                </div>
            </div>
            
            <div id="recommendation" class="recommendation"></div>
            
            <div class="checks-grid" id="checksGrid"></div>
            
            <div style="margin-top: 20px;">
                <button class="btn btn-success" onclick="deploy()" id="deployBtn">🚀 Deploy Now</button>
                <button class="btn btn-danger" onclick="cancelDeploy()">❌ Cancel</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Deployment History</h2>
            <div id="historyList"></div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
        
        async function validateDeployment() {
            const environment = document.getElementById('environment').value;
            const branch = document.getElementById('branch').value;
            const envVars = document.getElementById('envVars').value.split(',').map(v => v.trim()).filter(v => v);
            
            const response = await fetch(`${API_URL}/api/validate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ environment, branch, envVars })
            });
            
            const data = await response.json();
            displayValidationResults(data);
        }
        
        function displayValidationResults(data) {
            document.getElementById('validationResults').classList.remove('hidden');
            document.getElementById('passedCount').textContent = data.summary.passed;
            document.getElementById('warningCount').textContent = data.summary.warnings;
            document.getElementById('failedCount').textContent = data.summary.failed;
            
            const recommendation = document.getElementById('recommendation');
            recommendation.textContent = data.recommendation;
            recommendation.className = 'recommendation ' + (data.summary.failed > 0 ? 'danger' : data.summary.warnings > 0 ? 'warning' : 'safe');
            
            const checksGrid = document.getElementById('checksGrid');
            checksGrid.innerHTML = data.checks.map(check => `
                <div class="check-item ${check.status}">
                    <div class="check-name">${check.name}</div>
                    <div class="check-message">${check.message}</div>
                </div>
            `).join('');
            
            document.getElementById('deployBtn').disabled = data.summary.failed > 0;
        }
        
        async function deploy() {
            const environment = document.getElementById('environment').value;
            const branch = document.getElementById('branch').value;
            
            const response = await fetch(`${API_URL}/api/deploy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ environment, branch })
            });
            
            const data = await response.json();
            alert(data.success ? '✅ Deployment successful!' : '❌ Deployment failed and rolled back');
            loadHistory();
            cancelDeploy();
        }
        
        function cancelDeploy() {
            document.getElementById('validationResults').classList.add('hidden');
        }
        
        async function loadHistory() {
            const response = await fetch(`${API_URL}/api/history`);
            const data = await response.json();
            
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = data.deployments.map(d => `
                <div class="history-item">
                    <div>
                        <strong>${d.environment}</strong> - ${d.branch} (${d.commit})
                        <br>
                        <small>${new Date(d.timestamp).toLocaleString()} - ${d.duration}</small>
                    </div>
                    <div>
                        <span class="status-badge status-${d.status === 'success' ? 'success' : d.status === 'rolled_back' ? 'rollback' : 'failed'}">
                            ${d.status.toUpperCase()}
                        </span>
                        ${d.status === 'success' && !d.isRollback ? `<button class="btn btn-danger" style="margin-left: 10px; padding: 6px 12px;" onclick="rollback(${d.id})">Rollback</button>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        async function rollback(id) {
            if (!confirm('Are you sure you want to rollback this deployment?')) return;
            
            const response = await fetch(`${API_URL}/api/rollback/${id}`, { method: 'POST' });
            const data = await response.json();
            
            alert(data.success ? '✅ Rollback successful!' : '❌ Rollback failed');
            loadHistory();
        }
        
        // Load history on page load
        loadHistory();
    </script>
</body>
</html>
